server.port=8000
spring.application.name=foro-hub

# URL de conexion a la base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/${DB_NAME}?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC

# Usuario de tu MySQL
spring.datasource.username=${DB_USER}

# Contrasena de tu MySQL
spring.datasource.password=${DB_PASSWORD}


# Driver de MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
# 'update' crear las tablas automaticamente basandose en tus entidades Java
spring.jpa.hibernate.ddl-auto=update
# Muestra las consultas SQL en la consola para depurar
spring.jpa.show-sql=false
# Formatea el SQL para que sea legible
#spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
#Solo warning cosmetico de DevTools
logging.level.org.springframework.aop.framework.CglibAopProxy=WARN

# Dialecto de SQL para MySQL
#spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect // para eliminar error * consola *
# color en la consola
spring.output.ansi.enabled=always
#logging.level.org.hibernate.SQL=DEBUG

# Clave security
jwt.secret=${JWT_SECRET:mi_clave_secreta_super_larga_y_segura_1234567890}

# Configuracion de Google GenAI
spring.ai.google.genai.project-id=${PROJECT_ID}
spring.ai.google.genai.api-key=${GEMINI_APIKEY}

# Forzar el modelo compatible con la API gratuita
spring.ai.google.genai.chat.options.model=gemini-3-flash-preview

# Desactiva todos los logs (raiz)
#logging.level.root=OFF
logging.level.org.springframework.ai = OFF

logging.level.com.google.genai = OFF

logging.level.org.springframework.retry = OFF

spring.ai.retry.max-attempts = 1

spring.ai.google.genai.chat.options.timeout = 3000ms


# Mistral AI (comun)
spring.ai.mistralai.api-key=${MISTRAL_API_KEY}
#spring.ai.mistralai.chat.options.model=mistral-small-latest
#spring.ai.mistralai.chat.options.temperature=0.1

# Desactiva ChatClient auto-config que interfiere
spring.ai.chat.client.enabled=false
# DESACTIVA EMBEDDINGS MISTRAL (no los usas)
#spring.ai.model.embedding=none

# Desactivar all el sistema de observacion que causa conflictos de versiones
spring.ai.chat.observations.enabled=false
spring.ai.image.observations.enabled=false
management.observations.enable=false
spring.ai.vectorstore.observations.enabled=false